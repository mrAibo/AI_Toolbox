name: "Feature Request"
description: "Suggest a new feature or enhancement for AI Toolbox"
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out this form with as much detail as possible.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: What area does this feature affect?
      options:
        - Bootstrap / Setup
        - Rules / Workflows
        - Hooks / Automation
        - MCP Integration
        - Documentation / Examples
        - New Tool Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be specific.
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions have you considered?
      placeholder: "Another approach could be..."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low — Nice to have
        - Medium — Would improve workflow
        - High — Blocking critical workflow
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples?
