name: AI Toolbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check files exist
        run: |
          ls .agent/scripts/bootstrap.sh
          ls .agent/scripts/bootstrap.ps1
          ls AGENT.md
          ls README.md
          echo "OK"
