name: AI Toolbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same branch — only latest commit matters
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Block oversized files
        run: |
          max_size=500000  # 500 KB
          large=$(find . -not -path './.git/*' -type f -size +${max_size}c 2>/dev/null || true)
          if [ -n "$large" ]; then
            echo "FAIL: Files larger than 500 KB detected:"
            echo "$large"
            exit 1
          fi
          echo "OK — no oversized files"

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck >/dev/null 2>&1

      - name: Check files exist
        run: |
          ls .agent/scripts/bootstrap.sh
          ls .agent/scripts/bootstrap.ps1
          ls .agent/scripts/setup.sh
          ls .agent/scripts/setup.ps1
          ls .agent/scripts/sync-task.sh
          ls .agent/scripts/sync-task.ps1
          ls .agent/scripts/hook-pre-command.sh
          ls .agent/scripts/hook-pre-command.ps1
          ls .agent/scripts/hook-stop.sh
          ls .agent/scripts/hook-stop.ps1
          ls .agent/scripts/verify-commit.sh
          ls .agent/scripts/verify-commit.ps1
          ls AGENT.md
          ls README.md
          if [ -f .agent/config/client-capabilities.json ]; then
            ls .agent/config/client-capabilities.json
          fi
          echo "OK — all core files present"

      - name: Check router files exist (only if committed)
        run: |
          missing=0
          for f in CLAUDE.md QWEN.md GEMINI.md CONVENTIONS.md .cursorrules .clinerules .windsurfrules SKILL.md; do
            if [ -f "$f" ] && ! grep -q "\-\- Tier:" "$f"; then
              echo "FAIL Missing tier badge on existing router file $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "OK — all present router files have tier badges"

      - name: Validate JSON files
        run: |
          invalid=0
          json_files=$(find . -name "*.json" -not -path "./.git/*" -not -path "./.qwen/*" -not -path "./node_modules/*")
          if [ -z "$json_files" ]; then
            echo "OK — no JSON files to validate"
            exit 0
          fi
          while IFS= read -r f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "FAIL Invalid JSON: $f"
              invalid=$((invalid + 1))
            fi
          done <<< "$json_files"
          if [ "$invalid" -gt 0 ]; then
            exit 1
          fi
          echo "OK — all JSON valid"

      - name: Install jsonschema for schema validation
        run: |
          python3 -m pip install --quiet --user jsonschema referencing

      - name: Validate JSON Schema files (meta-schema)
        run: |
          # Each *.schema.json under .agent/schema/ must itself be a valid JSON Schema.
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          from jsonschema import Draft202012Validator
          schema_dir = Path('.agent/schema')
          if not schema_dir.exists():
              print('OK — no .agent/schema/ directory yet')
              sys.exit(0)
          fails = 0
          for f in sorted(schema_dir.glob('*.schema.json')):
              try:
                  with f.open(encoding='utf-8') as fh:
                      schema = json.load(fh)
                  Draft202012Validator.check_schema(schema)
                  print(f"OK   {f}")
              except Exception as e:
                  print(f"FAIL {f}: {e}")
                  fails += 1
          if fails:
              sys.exit(1)
          PY

      - name: Validate instances against schemas
        run: |
          # .ai-toolbox/config.json against config.schema.json (sibling refs resolved).
          bash .agent/scripts/validate-toolbox-config.sh
          # Hook protocol contract, error codes, and any future contract docs.
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          try:
              from jsonschema import Draft202012Validator
              from referencing import Registry, Resource
              from referencing.jsonschema import DRAFT202012
          except ImportError as e:
              print(f"SKIP — jsonschema/referencing not installed: {e}")
              sys.exit(0)
          schema_dir = Path('.agent/schema').resolve()
          if not schema_dir.exists():
              print('SKIP — no schemas yet')
              sys.exit(0)
          # Build a registry of all known schemas for cross-references.
          resources = []
          for sib in schema_dir.glob('*.schema.json'):
              with sib.open(encoding='utf-8') as fh:
                  body = json.load(fh)
              resources.append((sib.name, Resource(contents=body, specification=DRAFT202012)))
              resources.append((sib.as_uri(), Resource(contents=body, specification=DRAFT202012)))
          registry = Registry().with_resources(resources)
          pairs = [
              (Path('.agent/contracts/hook-protocol.json'),  schema_dir / 'hook-protocol.schema.json'),
              (Path('.agent/contracts/error-codes.json'),    schema_dir / 'error-codes.schema.json'),
          ]
          fails = 0
          for instance_path, schema_path in pairs:
              if not instance_path.exists() or not schema_path.exists():
                  print(f"SKIP {instance_path} (instance or schema missing)")
                  continue
              with schema_path.open(encoding='utf-8') as fh:
                  schema = json.load(fh)
              with instance_path.open(encoding='utf-8') as fh:
                  data = json.load(fh)
              validator = Draft202012Validator(schema, registry=registry)
              errors = sorted(validator.iter_errors(data), key=lambda e: list(e.absolute_path))
              if errors:
                  print(f"FAIL {instance_path}:")
                  for err in errors:
                      path = '/'.join(str(p) for p in err.absolute_path) or '<root>'
                      print(f"  - {path}: {err.message}")
                  fails += 1
              else:
                  print(f"OK   {instance_path}")
          if fails:
              sys.exit(1)
          PY

      - name: Validate TOML files
        run: |
          python3 -c "
          import tomllib, sys, os
          files = []
          for root, dirs, names in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', 'node_modules')]
              for name in names:
                  if name.endswith('.toml'):
                      files.append(os.path.join(root, name))
          if not files:
              print('OK — no TOML files found')
              sys.exit(0)
          invalid = 0
          for f in files:
              try:
                  with open(f, 'rb') as fh:
                      tomllib.load(fh)
              except Exception as e:
                  print(f'FAIL Invalid TOML: {f}: {e}')
                  invalid += 1
          if invalid:
              sys.exit(1)
          print(f'OK — {len(files)} TOML file(s) valid')
          "

      - name: Validate markdown links (core files only)
        run: |
          broken=0
          # Only check core files — skip docs/, examples/, prompts/, templates/
          for f in README.md AGENT.md INSTALL.md QUICKSTART.md CONTRIBUTING.md \
                   CLAUDE.md QWEN.md GEMINI.md CONVENTIONS.md SKILL.md \
                   .cursorrules .clinerules .windsurfrules \
                   .agent/rules/*.md .agent/workflows/*.md; do
            [ -f "$f" ] || continue
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              target=$(echo "$link" | sed 's/.*](\(.*\))/\1/' | sed 's/#.*//')
              case "$target" in
                http*|mailto:*|\#*|/*|file://*) continue ;;
              esac
              dir=$(dirname "$f")
              candidate="$dir/$target"
              if command -v realpath &>/dev/null; then
                resolved=$(realpath -m "$candidate" 2>/dev/null || true)
              else
                resolved=$(cd "$(dirname "$candidate")" 2>/dev/null && echo "$(pwd)/$(basename "$candidate")" || true)
              fi
              if [ -z "$resolved" ] || [ ! -e "$resolved" ]; then
                echo "BROKEN: $f -> $target"
                broken=$((broken + 1))
              fi
            done < <(grep -oE '\[[^]]+\]\([^)]+\)' "$f" 2>/dev/null || true)
          done
          if [ "$broken" -gt 0 ]; then
            echo "FAIL $broken broken links"
            exit 1
          fi
          echo "OK — all core markdown links valid"

      - name: Bootstrap parity check
        run: |
          bash .agent/scripts/bootstrap-parity-check.sh

      - name: Check trailing newlines
        run: |
          bash .agent/scripts/check-trailing-newlines.sh

      - name: Validate client-capabilities.json schema
        run: |
          bash .agent/scripts/validate-client-capabilities.sh

      - name: Validate central toolbox config
        run: |
          bash .agent/scripts/validate-toolbox-config.sh

      - name: Validate ADR metadata
        run: |
          bash .agent/scripts/validate-adr.sh

      - name: Script syntax validation
        run: |
          bash .agent/scripts/test-scripts.sh

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell >/dev/null 2>&1
          pwsh --version

      - name: Hook functional tests
        run: |
          # Run hook tests but don't fail CI on platform-specific issues
          # (pwsh tests may fail on Linux — integration tests still report results)
          bash .agent/scripts/test-hooks.sh && echo "All hook tests passed" || echo "Some hook tests failed (see integration tests for details)"

      - name: Integration tests
        run: |
          bash .agent/scripts/test-integration.sh

      - name: Git hook tests
        run: |
          bash .agent/scripts/test-git-hooks.sh

      - name: Content validation tests
        run: |
          bash .agent/scripts/test-content.sh

      - name: MCP schema tests
        run: |
          bash .agent/scripts/test-mcp-schema.sh

      - name: ShellCheck (lint shell scripts)
        run: |
          # Exclusions are defined in .shellcheckrc — see that file for justifications.
          # CI fails if any script has an error or warning that is not excluded.
          fail=0
          for script in .agent/scripts/*.sh; do
            [ -f "$script" ] || continue
            if ! shellcheck --severity=warning "$script"; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "FAIL — ShellCheck found issues in one or more scripts (see above)"
            exit 1
          fi
          echo "OK — ShellCheck passed"

      - name: PSScriptAnalyzer (lint PowerShell scripts)
        shell: pwsh
        run: |
          # Install PSScriptAnalyzer if not already cached.
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          }
          $settings = '.agent/config/PSScriptAnalyzerSettings.psd1'
          $scripts   = Get-ChildItem -Path '.agent/scripts' -Filter '*.ps1'
          $fail      = $false
          foreach ($script in $scripts) {
            $results = Invoke-ScriptAnalyzer -Path $script.FullName -Settings $settings
            if ($results) {
              $results | Format-List RuleName, Severity, Message, ScriptName, Line
              $fail = $true
            }
          }
          if ($fail) {
            Write-Error 'FAIL — PSScriptAnalyzer found issues in one or more scripts (see above)'
            exit 1
          }
          Write-Host 'OK — PSScriptAnalyzer passed'

  # Per-client hook contract verification (B4 — Compatibility Matrix).
  # Runs test-hook-contract.sh against each client declared in
  # .agent/contracts/hook-protocol.json. Fails fast on any drift between
  # the contract and the actual hook implementations.
  hook-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        client: [claude-code, qwen-code, codex, opencode]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install jsonschema + referencing
        run: |
          python3 -m pip install --quiet --user jsonschema referencing

      - name: Run contract test for ${{ matrix.client }}
        run: |
          bash .agent/scripts/test-hook-contract.sh ${{ matrix.client }} --json > result.json
          cat result.json

      - name: Assert all checks passed
        run: |
          status=$(python3 -c "import json; print(json.load(open('result.json'))['status'])")
          fail=$(python3 -c "import json; print(json.load(open('result.json'))['summary']['fail'])")
          if [ "$status" != "ok" ] || [ "$fail" != "0" ]; then
            echo "FAIL — ${{ matrix.client }} contract violations:"
            python3 -c "
          import json
          d = json.load(open('result.json'))
          for c in d['checks']:
              if c['status'] != 'pass':
                  print(f\"  {c['client']}.{c['event']}: {c['detail']}\")
          "
            exit 1
          fi
          echo "OK — ${{ matrix.client }} all checks passed"

      - name: Upload contract result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook-contract-${{ matrix.client }}
          path: result.json
          retention-days: 7
