name: AI Toolbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bootstrap scripts exist
        run: |
          test -f .agent/scripts/bootstrap.sh
          test -f .agent/scripts/bootstrap.ps1
          chmod +x .agent/scripts/bootstrap.sh
          chmod +x .agent/scripts/*.sh
          echo "OK Bootstrap scripts present"

      - name: Validate markdown links
        run: |
          broken=0
          for f in $(find . -name "*.md" -not -path "./.git/*"); do
            links=$(grep -oE '\[[^]]+\]\([^)]+\)' "$f" 2>/dev/null || true)
            for link in $links; do
              target=$(echo "$link" | sed 's/.*](\(.*\))/\1/' | sed 's/#.*//')
              case "$target" in
                http*|mailto:*|\#*|/*) continue ;;
              esac
              dir=$(dirname "$f")
              if [ ! -e "$dir/$target" ]; then
                echo "BROKEN: $f -> $target"
                broken=$((broken + 1))
              fi
            done
          done
          if [ "$broken" -gt 0 ]; then
            echo "FAIL $broken broken links"
            exit 1
          fi
          echo "OK All links valid"

      - name: Verify tier badges
        run: |
          missing=0
          for f in CLAUDE.md QWEN.md GEMINI.md CONVENTIONS.md .cursorrules .clinerules .windsurfrules; do
            if [ -f "$f" ] && ! grep -q "\-\- Tier:" "$f"; then
              echo "FAIL Missing tier badge on $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "OK All tier badges present"

      - name: Validate JSON files
        run: |
          invalid=0
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "FAIL Invalid JSON: $f"
              invalid=$((invalid + 1))
            fi
          done
          if [ "$invalid" -gt 0 ]; then
            exit 1
          fi
          echo "OK All JSON valid"
