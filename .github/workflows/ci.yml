name: AI Toolbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same branch — only latest commit matters
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Block oversized files
        run: |
          max_size=500000  # 500 KB
          large=$(find . -not -path './.git/*' -type f -size +${max_size}c 2>/dev/null || true)
          if [ -n "$large" ]; then
            echo "FAIL: Files larger than 500 KB detected:"
            echo "$large"
            exit 1
          fi
          echo "OK — no oversized files"

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck >/dev/null 2>&1

      - name: Check files exist
        run: |
          ls .agent/scripts/bootstrap.sh
          ls .agent/scripts/bootstrap.ps1
          ls .agent/scripts/setup.sh
          ls .agent/scripts/setup.ps1
          ls .agent/scripts/sync-task.sh
          ls .agent/scripts/sync-task.ps1
          ls .agent/scripts/hook-pre-command.sh
          ls .agent/scripts/hook-pre-command.ps1
          ls .agent/scripts/hook-stop.sh
          ls .agent/scripts/hook-stop.ps1
          ls .agent/scripts/verify-commit.sh
          ls .agent/scripts/verify-commit.ps1
          ls AGENT.md
          ls README.md
          if [ -f .agent/config/client-capabilities.json ]; then
            ls .agent/config/client-capabilities.json
          fi
          echo "OK — all core files present"

      - name: Check router files exist (only if committed)
        run: |
          missing=0
          for f in CLAUDE.md QWEN.md GEMINI.md CONVENTIONS.md .cursorrules .clinerules .windsurfrules SKILL.md; do
            if [ -f "$f" ] && ! grep -q "\-\- Tier:" "$f"; then
              echo "FAIL Missing tier badge on existing router file $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "OK — all present router files have tier badges"

      - name: Validate JSON files
        run: |
          invalid=0
          json_files=$(find . -name "*.json" -not -path "./.git/*" -not -path "./.qwen/*" -not -path "./node_modules/*")
          if [ -z "$json_files" ]; then
            echo "OK — no JSON files to validate"
            exit 0
          fi
          while IFS= read -r f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "FAIL Invalid JSON: $f"
              invalid=$((invalid + 1))
            fi
          done <<< "$json_files"
          if [ "$invalid" -gt 0 ]; then
            exit 1
          fi
          echo "OK — all JSON valid"

      - name: Validate markdown links (core files only)
        run: |
          broken=0
          # Only check core files — skip docs/, examples/, prompts/, templates/
          for f in README.md AGENT.md INSTALL.md QUICKSTART.md CONTRIBUTING.md \
                   CLAUDE.md QWEN.md GEMINI.md CONVENTIONS.md SKILL.md \
                   .cursorrules .clinerules .windsurfrules \
                   .agent/rules/*.md .agent/workflows/*.md; do
            [ -f "$f" ] || continue
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              target=$(echo "$link" | sed 's/.*](\(.*\))/\1/' | sed 's/#.*//')
              case "$target" in
                http*|mailto:*|\#*|/*|file://*) continue ;;
              esac
              dir=$(dirname "$f")
              candidate="$dir/$target"
              if command -v realpath &>/dev/null; then
                resolved=$(realpath -m "$candidate" 2>/dev/null || true)
              else
                resolved=$(cd "$(dirname "$candidate")" 2>/dev/null && echo "$(pwd)/$(basename "$candidate")" || true)
              fi
              if [ -z "$resolved" ] || [ ! -e "$resolved" ]; then
                echo "BROKEN: $f -> $target"
                broken=$((broken + 1))
              fi
            done < <(grep -oE '\[[^]]+\]\([^)]+\)' "$f" 2>/dev/null || true)
          done
          if [ "$broken" -gt 0 ]; then
            echo "FAIL $broken broken links"
            exit 1
          fi
          echo "OK — all core markdown links valid"

      - name: Bootstrap parity check
        run: |
          bash .agent/scripts/bootstrap-parity-check.sh

      - name: Check trailing newlines
        run: |
          bash .agent/scripts/check-trailing-newlines.sh

      - name: Validate client-capabilities.json schema
        run: |
          bash .agent/scripts/validate-client-capabilities.sh

      - name: Script syntax validation
        run: |
          bash .agent/scripts/test-scripts.sh

      - name: Shellcheck (lint shell scripts)
        run: |
          issues=0
          for script in .agent/scripts/*.sh; do
            [ -f "$script" ] || continue
            # Exclude common patterns that are intentional in this project:
            # SC1090/1091: Can't follow non-constant source
            # SC2086: Double quote to prevent globbing (often intentional)
            # SC2016: Expressions don't expand in single quotes (heredocs)
            # SC2015: A && B || C is not if-then-else (common idiom)
            # SC2005/2002: echo/cat useless use (style preference)
            # SC2162: read without -r (interactive scripts)
            # SC2207: Prefer mapfile (style preference)
            # SC2034: Unused variable (often false positives in heredocs)
            # SC2155: Declare and assign separately (style preference)
            # SC2046: Quote $(cmd) (often intentional)
            # SC2181: Check exit code directly (often intentional for logging)
            # SC2154: Variable referenced but not assigned (false positive)
            output=$(shellcheck -e SC1090,SC1091,SC2086,SC2016,SC2015,SC2005,SC2002,SC2162,SC2207,SC2034,SC2155,SC2046,SC2181,SC2154 "$script" 2>&1) && rc=0 || rc=$?
            if [ $rc -ne 0 ]; then
              echo "ISSUES in $script:"
              echo "$output"
              issues=$((issues + 1))
            fi
          done
          if [ "$issues" -gt 0 ]; then
            echo "FAIL: shellcheck found issues in $issues file(s)"
            exit 1
          fi
          echo "OK — shellcheck passed for all .sh files"
