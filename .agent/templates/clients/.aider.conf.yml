# Aider configuration for AI Toolbox projects
# See: https://aider.chat/docs/config/aider_conf.html

## Model settings (uncomment and adjust as needed)
# model: gpt-4o
# weak-model: gpt-4o-mini

## Context files loaded at startup
read:
  - CONVENTIONS.md
  - .agent/memory/current-task.md
  - .agent/rules/safety-rules.md

## Auto-commits: disabled to allow manual review
auto-commits: false

## Show diffs before applying
show-diffs: true

## Gitignore patterns are managed by the AI Toolbox .gitignore 
